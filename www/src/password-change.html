<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boorker - Change Password</title>
    <link rel="stylesheet" href="/css/app.css">
    <style>
        .warning-banner {
            background: var(--warning);
            color: white;
            padding: 0.75rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
        }
        .requirements {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        .requirements code {
            background: var(--bg-tertiary);
            padding: 0.1rem 0.25rem;
            border-radius: 2px;
            font-family: monospace;
        }
        .validation-error {
            color: var(--danger);
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        .input-valid {
            border-color: var(--success) !important;
        }
        .input-invalid {
            border-color: var(--danger) !important;
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container" style="max-width: 380px;">
        <h1>boorker</h1>

        <div class="warning-banner">
            Password Change Required<br>
            <small>You must change the default password before accessing the device.</small>
        </div>

        <form id="password-form">
            <div class="form-group">
                <label for="current-password">Current Password</label>
                <input type="password" id="current-password" name="current_password" required autofocus>
            </div>

            <div class="form-group">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password" name="new_password" required>
                <div class="requirements">
                    8-64 characters. Allowed: A-Z, a-z, 0-9, and<br>
                    <code>!@#$%^&amp;*()_+-=[]{}|;:',.<>?/~`</code> and space
                </div>
                <div id="new-password-error" class="validation-error hidden"></div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm New Password</label>
                <input type="password" id="confirm-password" name="confirm_password" required>
                <div id="confirm-password-error" class="validation-error hidden"></div>
            </div>

            <div id="error-msg" class="error hidden"></div>
            <button type="submit" id="submit-btn">Change Password</button>
        </form>
    </div>

    <script>
        const PASSWORD_REGEX = /^[A-Za-z0-9 !@#$%^&*()_+\-=\[\]{}|;:',.<>?\/~`]+$/;
        const MIN_LENGTH = 8;
        const MAX_LENGTH = 64;

        const newPasswordInput = document.getElementById('new-password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const newPasswordError = document.getElementById('new-password-error');
        const confirmPasswordError = document.getElementById('confirm-password-error');
        const errorEl = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submit-btn');

        function validateNewPassword() {
            const value = newPasswordInput.value;
            newPasswordInput.classList.remove('input-valid', 'input-invalid');
            newPasswordError.classList.add('hidden');

            if (value.length === 0) return true; // Don't validate empty

            if (value.length < MIN_LENGTH) {
                newPasswordInput.classList.add('input-invalid');
                newPasswordError.textContent = 'Password must be at least ' + MIN_LENGTH + ' characters';
                newPasswordError.classList.remove('hidden');
                return false;
            }

            if (value.length > MAX_LENGTH) {
                newPasswordInput.classList.add('input-invalid');
                newPasswordError.textContent = 'Password must be at most ' + MAX_LENGTH + ' characters';
                newPasswordError.classList.remove('hidden');
                return false;
            }

            if (!PASSWORD_REGEX.test(value)) {
                newPasswordInput.classList.add('input-invalid');
                newPasswordError.textContent = 'Password contains invalid characters';
                newPasswordError.classList.remove('hidden');
                return false;
            }

            newPasswordInput.classList.add('input-valid');
            return true;
        }

        function validateConfirmPassword() {
            const newVal = newPasswordInput.value;
            const confirmVal = confirmPasswordInput.value;
            confirmPasswordInput.classList.remove('input-valid', 'input-invalid');
            confirmPasswordError.classList.add('hidden');

            if (confirmVal.length === 0) return true; // Don't validate empty

            if (confirmVal !== newVal) {
                confirmPasswordInput.classList.add('input-invalid');
                confirmPasswordError.textContent = 'Passwords do not match';
                confirmPasswordError.classList.remove('hidden');
                return false;
            }

            confirmPasswordInput.classList.add('input-valid');
            return true;
        }

        newPasswordInput.addEventListener('input', () => {
            validateNewPassword();
            if (confirmPasswordInput.value.length > 0) {
                validateConfirmPassword();
            }
        });

        confirmPasswordInput.addEventListener('input', validateConfirmPassword);

        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.classList.add('hidden');

            // Validate before submit
            const newValid = validateNewPassword();
            const confirmValid = validateConfirmPassword();

            if (!newValid || !confirmValid) {
                return;
            }

            const currentPassword = document.getElementById('current-password').value;
            const newPassword = newPasswordInput.value;
            // Note: confirmPassword match already validated by validateConfirmPassword()

            submitBtn.disabled = true;
            submitBtn.textContent = 'Changing...';

            try {
                const resp = await fetch('/api/v1/auth/password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        current_password: currentPassword,
                        new_password: newPassword
                    })
                });

                if (resp.ok) {
                    // Success - redirect to dashboard
                    window.location.href = '/';
                } else {
                    const data = await resp.json();
                    if (data.error === 'invalid_password') {
                        errorEl.textContent = 'Current password is incorrect';
                    } else if (data.error === 'invalid_length') {
                        errorEl.textContent = 'Password length must be 8-64 characters';
                    } else if (data.error === 'invalid_characters') {
                        errorEl.textContent = 'Password contains invalid characters';
                    } else {
                        errorEl.textContent = data.message || 'Password change failed';
                    }
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                if (err instanceof TypeError) {
                    errorEl.textContent = 'Server returned invalid response';
                } else {
                    errorEl.textContent = 'Connection error - check network';
                }
                console.error('Password change error:', err);
                errorEl.classList.remove('hidden');
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'Change Password';
        });
    </script>
</body>
</html>
